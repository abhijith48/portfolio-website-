<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>404 · Abhijith B Lal</title>
<meta name="robots" content="noindex" />
<meta name="theme-color" content="#0f0e0c" />
<script>try { const t = localStorage.getItem('theme'); if (t === 'light') document.documentElement.dataset.theme = 'light'; } catch (e) {}</script>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230f0e0c'/%3E%3Ctext x='32' y='43' font-family='monospace' font-size='30' font-weight='700' fill='%23c2f23f' text-anchor='middle'%3EA_%3C/text%3E%3C/svg%3E" />
<style>
  @font-face { font-family: 'IBM Plex Mono'; font-style: normal; font-weight: 400; font-display: swap; src: url('fonts/ibm-plex-mono-400.woff2') format('woff2'); }
  @font-face { font-family: 'IBM Plex Mono'; font-style: normal; font-weight: 500; font-display: swap; src: url('fonts/ibm-plex-mono-500.woff2') format('woff2'); }

  :root {
    --ink: #0f0e0c; --ink-2: #16140f; --panel: #1b1813; --line: #2e2a22;
    --cream: #f3ede1; --cream-dim: #a89f8d; --cream-faint: #7d7565;
    --signal: #c2f23f; --signal-deep: #9bc52a;
  }
  html[data-theme="light"] {
    --ink: #faf7f0; --ink-2: #f2eee3; --panel: #eae5d6; --line: #ddd6c4;
    --cream: #1c1a13; --cream-dim: #4e4a3c; --cream-faint: #6e6754;
    --signal: #45691a; --signal-deep: #37530f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--ink); color: var(--cream);
    font-family: "IBM Plex Mono", monospace;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  body::before {
    content: ""; position: fixed; inset: 0;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 64px 64px; opacity: .16; pointer-events: none;
    mask-image: radial-gradient(ellipse 90% 60% at 50% 0%, #000 30%, transparent 80%);
    -webkit-mask-image: radial-gradient(ellipse 90% 60% at 50% 0%, #000 30%, transparent 80%);
  }
  ::selection { background: var(--signal); color: var(--ink); }
  .term {
    width: 100%; max-width: 560px; position: relative; z-index: 1;
    background: var(--ink-2); border: 1px solid var(--line); border-radius: 8px;
    overflow: hidden; box-shadow: 0 24px 60px -30px rgba(0,0,0,.6);
  }
  .bar {
    display: flex; align-items: center; gap: 7px;
    padding: 11px 14px; border-bottom: 1px solid var(--line); background: var(--panel);
  }
  .bar i { width: 10px; height: 10px; border-radius: 50%; background: var(--line); }
  .bar i:first-child { background: #5a5348; }
  .bar em { font-style: normal; font-size: 11.5px; color: var(--cream-faint); margin-left: 8px; }
  .out { padding: 22px 24px; font-size: 13.5px; line-height: 2; color: var(--cream-dim); }
  .cmd { color: var(--cream); }
  .cmd::before { content: "$ "; color: var(--signal); }
  .err { color: #e06c5a; }
  .dim { color: var(--cream-faint); }
  .ok { color: var(--signal); }
  a { color: var(--signal); text-decoration: underline; }
  .caret {
    display: inline-block; width: 7px; height: 13px; vertical-align: -2px;
    background: var(--signal); animation: blink 1.1s steps(1) infinite;
  }
  @keyframes blink { 0%,55% { opacity: 1 } 56%,100% { opacity: 0 } }
  @media (prefers-reduced-motion: reduce) { .caret { animation: none; } }
</style>
</head>
<body>
  <main class="term">
    <div class="bar"><i></i><i></i><i></i><em>abl@eval · zsh</em></div>
    <div class="out">
      <div class="cmd">GET <span id="path">/this-page</span></div>
      <div class="err">✗ 404: route not found</div>
      <div class="dim">  searched 6 sections · 0 results</div>
      <div class="ok">  → try <a href="/">abhijith48.github.io</a></div>
      <div><span class="caret"></span></div>
    </div>
  </main>
  <script>
    const p = document.getElementById('path');
    p.textContent = location.pathname || '/this-page';
  </script>
</body>
</html>
